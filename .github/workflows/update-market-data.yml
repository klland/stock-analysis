name: Update market data

on:
  schedule:
    # 16:30 Asia/Taipei. GitHub Actions schedules use UTC.
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh market data
        run: node scripts/update-market-data.mjs

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check data/market-data.js

      - name: Audit required symbols
        run: >
          node -e "global.window={};
          require('./data/market-data.js');
          const d = global.window.TWSE_MARKET_DATA;
          const has = (s) => d.daily.some((r) => r.Code === s) ||
          d.tpexDaily.some((r) => r['代號'] === s) ||
          d.usDaily.some((r) => r.symbol === s);
          const required = ['00631L', '00981A', '00735', 'AAPL', 'SPY'];
          const missing = required.filter((symbol) => !has(symbol));
          if (missing.length) {
            console.error(`Missing required symbols: ${missing.join(', ')}`);
            process.exit(1);
          }
          console.log(`Market data date ${d.date}; TWSE ${d.daily.length}, TPEx ${d.tpexDaily.length}, companies ${d.companies.length}, US ${d.usDaily.length}.`);"

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/market-data.js; then
            echo "No market data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-data.js
          git commit -m "chore: update market data"
          git push
